# SonarCloud config for Off Grid AI Desktop.
# Organization + project live under https://sonarcloud.io/organizations/off-grid-ai.
# projectKey confirmed against the SonarCloud project (off-grid-ai_off-grid-ai-desktop).
sonar.organization=off-grid-ai
sonar.projectKey=off-grid-ai_off-grid-ai-desktop
sonar.projectName=Off Grid AI Desktop

# ONE project scans the whole product: core src + the pro submodule (checked out
# into ./pro by the CI step). They ship together, so a single quality gate over
# both is what actually reflects the app. (The Sonar project is org-gated, not a
# public publish of pro source; pro therefore needs no separate Sonar project.)
# If pro/ is absent (a fork without the cross-repo token), Sonar just finds no
# files under pro/ — not an error.
sonar.sources=src,pro/main,pro/renderer
sonar.tests=src,pro/main,pro/renderer
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/__tests__/**
sonar.exclusions=**/node_modules/**,out/**,dist/**,e2e/**,resources/**,component-library-animations/**,**/*.d.ts

# Coverage: vitest emits lcov to coverage/lcov.info (npm run test:coverage) and
# already measures BOTH core and pro, matching the unified sources above.
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.lcov.reportPaths=coverage/lcov.info
