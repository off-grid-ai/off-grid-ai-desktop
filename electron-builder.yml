# Single build is the pro-capable one (license-gated). Keep the `.pro` bundle id so
# existing Pro installs auto-update into it (bundle id + granted TCC permissions match).
appId: co.getoffgridai.desktop.pro
productName: Off Grid AI Desktop
copyright: © Off Grid AI
# This hook runs before electron-builder emits artifactCreated, which is the event
# that schedules publishing. A truncated DMG therefore cannot reach GitHub.
artifactBuildCompleted: scripts/verify-electron-builder-artifact.js
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  # Local profiles and agent worktrees may contain private user data, downloaded
  # multi-GB models, nested builds, or symlinks outside the repository. They are
  # never application inputs. Keep this boundary here rather than relying on
  # .gitignore: electron-builder packages filesystem contents, not only git files.
  - '!{.demo-profile,.offgrid,.claude,.Codex,coverage}/**'
  - '!src/*'
  - '!pro/**'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json,tsconfig.web.tsbuildinfo}'
  - '!**/*.tsbuildinfo'
# Bundles everything under resources/ (the local model runner — llama/whisper/ffmpeg/sd
# — plus the native helpers release.yml stages into resources/bin: meeting-recorder, the
# dictation hotkey, etc.) + UI assets. Those native binaries are built fresh and copied
# into resources/bin by release.yml BEFORE this runs, so they get bundled and signed in
# the normal pass. (An earlier note claimed a separate "Pro build config" added
# meeting-recorder — there is no such config; that gap shipped it missing, so it is now
# staged in release.yml like the rest.)
extraResources:
  - from: resources
    to: .
    filter:
      - '**/*'
      - '!models/**'
win:
  executableName: off-grid-ai
  # Without this, electron-builder ships the default Electron icon on Windows (the
  # mac block sets its own icon below). The 512x512 PNG is auto-converted to a
  # multi-size Windows ICO for the exe + NSIS installer.
  icon: resources/icon.png
nsis:
  artifactName: ${name}-${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
mac:
  # DMG is the human download; the zip + latest-mac.yml (generated for the zip)
  # are what electron-updater needs, so auto-update keeps working. One build, one
  # update channel — no core/pro split, no arch variants to confuse anyone.
  target:
    - dmg
    - zip
  category: public.app-category.productivity
  hardenedRuntime: true
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    - NSMicrophoneUsageDescription: Off Grid AI uses the microphone for on-device voice input. Audio is processed locally and never leaves your device.
    - NSCameraUsageDescription: Off Grid AI may use the camera for on-device vision features. Frames are processed locally and never leave your device.
    - NSDocumentsFolderUsageDescription: Off Grid AI reads documents you add to a project so it can answer questions about them — locally, on your device.
    - NSDownloadsFolderUsageDescription: Off Grid AI reads files you add to a project so it can answer questions about them — locally, on your device.
  notarize: true
  icon: resources/icon.png
  # NOTE: no afterSign re-sign hook. electron-builder already signs every nested
  # binary (resources/bin/*) with hardenedRuntime + these entitlements and then
  # notarizes + staples. A post-sign re-sign (the old resign.js) re-signed AFTER
  # notarization → invalidated the staple → "Unnotarized Developer ID". Let
  # electron-builder's signing stand.
dmg:
  artifactName: ${name}-${version}.${ext}
  # The app is currently ~3.3 GB before compression. macOS 26 adds an EFI/GPT
  # partition to large HFS images, so dmgbuild's computed size can leave less usable
  # space than the bundle needs. Allocate deterministic headroom, then shrink after
  # the copy so the published download remains compressed to its actual contents.
  size: 5g
  shrink: true
linux:
  target:
    - AppImage
    - deb
  maintainer: Off Grid AI <hello@getoffgridai.co>
  category: Utility
appImage:
  artifactName: ${name}-${version}.${ext}
npmRebuild: false
# Electron fuses (flipped at package time). ASAR integrity makes a tampered app.asar
# refuse to load — the local-first anti-tamper lever (we don't phone home, so this is
# the bar against cracking the offline license check). Only the integrity fuses are
# set: we deliberately leave runAsNode ENABLED because TTS spawns process.execPath as
# a Node worker (disabling it would break on-device voice).
electronFuses:
  enableEmbeddedAsarIntegrityValidation: true
  onlyLoadAppFromAsar: true
publish:
  provider: github
  owner: off-grid-ai
  # Current repo name. It was renamed from `desktop`; the old name still 301-redirects,
  # but the updater must not depend on that redirect (a new `off-grid-ai/desktop` repo
  # would silently break every client's update check). Point straight at the real repo.
  repo: off-grid-ai-desktop
  # Publish (not draft) so electron-updater on installed apps sees the release.
  releaseType: release
